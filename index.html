<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Superman Energy Wave Loader</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #06070a; /* Pitch black with a 1% blue tint */
      overflow: hidden;
    }

    .loader-container {
      position: relative;
      width: 160px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2.5s ease-in-out infinite;
    }

    /* THE PROXIMITY DIAL: 
      If the lights are too far from your PNG, lower '104px' to '100px' or '98px'. 
      If they clip inside your logo, raise it to '108px'. The height auto-scales!
    */
    .shield-frame {
      position: absolute;
      width: 104px; 
      height: auto;
      z-index: 1;
      overflow: visible;
    }

    /* Flips the second SVG so the yellow wave orbits the opposite direction */
    .frame-reverse {
      transform: scaleX(-1);
    }

    polygon {
      fill: none;
      stroke-width: 1.2px; /* Razor-thin light filament */
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Electric Blue Wave */
    .wave-blue {
      stroke: #8ae8ff; /* White-hot cyan core */
      filter: drop-shadow(0 0 2px #ffffff) drop-shadow(0 0 8px #0058f0) drop-shadow(0 0 15px #0058f0);
      /* Mathematical sequence: [Big Head] [gap] [body] [gap] [tail] [massive empty space] */
      stroke-dasharray: 24 3 8 3 3 239; 
      animation: wave-travel 2s linear infinite;
    }

    /* Solar Yellow Wave */
    .wave-yellow {
      stroke: #fffb8f; /* White-hot yellow core */
      filter: drop-shadow(0 0 2px #ffffff) drop-shadow(0 0 8px #fce300) drop-shadow(0 0 15px #fce300);
      stroke-dasharray: 24 3 8 3 3 239; 
      animation: wave-travel 2s linear infinite -1s; /* -1s puts it on the exact opposite side */
    }

    /* The Center Logo */
    .loading-logo {
      position: absolute;
      width: 100px; /* Locked base width */
      height: auto;
      z-index: 10;
      filter: drop-shadow(0px 4px 12px rgba(0,0,0,0.95));
    }

    @keyframes wave-travel {
      0% { stroke-dashoffset: 280; } /* 280 is the exact pixel perimeter of this polygon */
      100% { stroke-dashoffset: 0; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
  </style>
</head>
<body>

  <div class="loader-container">
    
    <svg class="shield-frame" viewBox="0 0 100 82">
      <polygon class="wave-blue" points="4,4 96,4 99,23 50,79 1,23" />
    </svg>

    <svg class="shield-frame frame-reverse" viewBox="0 0 100 82">
      <polygon class="wave-yellow" points="4,4 96,4 99,23 50,79 1,23" />
    </svg>

    <img 
      src="logo.png" 
      alt="Loading..." 
      class="loading-logo"
    >

  </div>

</body>
</html>
