<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Superman Bifrost Loader</title>
  <style>
    :root {
      /* Master Size: Change this to shrink or grow the entire loader */
      --loader-size: 140px; 
    }

    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #030407; 
      overflow: hidden;
    }

    /* Container perfectly hugs the PNG dimensions */
    .loader-stage {
      position: relative;
      width: var(--loader-size);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: hover-pulse 3s ease-in-out infinite;
    }

    .loading-logo {
      width: 100%;
      height: auto;
      display: block;
      z-index: 10;
      filter: drop-shadow(0 4px 15px rgba(0,0,0,0.9));
    }

    /* SVG maps precisely over the image container */
    .bifrost-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 12;
      overflow: visible;
      /* FINE-TUNING DIALS:
         If the lights are slightly too small/big for your specific PNG's transparent padding, 
         change scale(1.02) up or down (e.g., 0.98 or 1.05) to shrink-wrap it perfectly. 
      */
      transform: scale(1.02) translateY(1%); 
    }

    /* Base setup for all Bifrost strands */
    .bifrost-strand {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      /* 
         The math here creates the "shattered wave" effect:
         [tiny beam] [gap] [med beam] [gap] [tiny beam] ... [MASSIVE GAP]
         Total perimeter of the polygon is roughly 305px.
      */
      animation: bifrost-flow 2s linear infinite;
    }

    /* Strand 1: Cyan / Blue */
    .strand-1 {
      stroke: #00f0ff;
      stroke-width: 1.5px;
      stroke-dasharray: 4 2 12 4 2 281;
      filter: drop-shadow(0 0 4px #0058f0);
    }

    /* Strand 2: Purple / Magenta */
    .strand-2 {
      stroke: #d000ff;
      stroke-width: 0.8px;
      stroke-dasharray: 2 4 8 2 6 283;
      animation-duration: 1.9s; /* Slightly faster to create internal wave shifting */
    }

    /* Strand 3: Solar Yellow / Orange */
    .strand-3 {
      stroke: #fffb00;
      stroke-width: 1px;
      stroke-dasharray: 8 2 4 4 10 277;
      filter: drop-shadow(0 0 6px #ff4800);
      animation-duration: 2.1s;
    }

    /* Strand 4: White Hot Core */
    .strand-4 {
      stroke: #ffffff;
      stroke-width: 1.8px;
      stroke-dasharray: 2 1 4 2 2 294;
      filter: drop-shadow(0 0 8px #ffffff);
      animation-duration: 2s;
    }

    /* Strand 5: Trailing Pink Sparks */
    .strand-5 {
      stroke: #ff0066;
      stroke-width: 0.5px;
      stroke-dasharray: 1 6 2 8 1 287;
      animation-duration: 2.2s;
    }

    /* 305 represents the full mathematical distance around the 5 points */
    @keyframes bifrost-flow {
      0% { stroke-dashoffset: 305; }
      100% { stroke-dashoffset: 0; }
    }

    @keyframes hover-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
  </style>
</head>
<body>

  <div class="loader-stage">
    
    <img 
      src="logo.png" 
      alt="Loading..." 
      class="loading-logo"
    >

    <svg class="bifrost-svg" viewBox="0 0 100 100">
      <!-- 
        Standardized Superman Coordinates.
        Top-Left(5,22) -> Top-Right(95,22) -> Right-Corner(99,40) -> Bottom-Tip(50,96) -> Left-Corner(1,40)
      -->
      <polygon class="bifrost-strand strand-1" points="5,22 95,22 99,40 50,96 1,40" />
      <polygon class="bifrost-strand strand-2" points="5,22 95,22 99,40 50,96 1,40" />
      <polygon class="bifrost-strand strand-3" points="5,22 95,22 99,40 50,96 1,40" />
      <polygon class="bifrost-strand strand-4" points="5,22 95,22 99,40 50,96 1,40" />
      <polygon class="bifrost-strand strand-5" points="5,22 95,22 99,40 50,96 1,40" />
    </svg>

  </div>

</body>
</html>
