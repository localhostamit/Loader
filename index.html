<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Superman Ethereal Plasma Loader</title>
  <style>
    :root {
      /* Master Size: Scale this up or down, the whole loader will scale proportionally */
      --loader-size: 190px; 
    }

    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #030407; /* Deep OLED black */
      overflow: hidden;
    }

    .loader-stage {
      position: relative;
      width: var(--loader-size);
      height: var(--loader-size);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: stage-breathe 3s ease-in-out infinite;
    }

    /* Ambient background atmosphere */
    .loader-stage::before {
      content: '';
      position: absolute;
      width: 55%;
      height: 55%;
      background: radial-gradient(circle, rgba(0, 88, 240, 0.25) 0%, rgba(252, 227, 0, 0.08) 60%, transparent 80%);
      filter: blur(20px);
    }

    .plasma-svg {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 2;
      overflow: visible;
    }

    .loading-logo {
      position: absolute;
      /* CRITICAL TWEAK: PNG files have invisible blank space around the 'S'. 
        If the lights are too far away from the logo, raise '66%' to '70%'. 
        If the lights clip into the red, drop it to '63%'.
      */
      width: 66%; 
      height: auto;
      z-index: 10;
      filter: drop-shadow(0 4px 18px rgba(0, 0, 0, 0.95));
      transform: translateY(-2%); /* Micro-lifts the visual weight of the shield into the center */
    }

    /* The Light Ribbon Master Class */
    .wave-path {
      fill: none;
      stroke-width: 1.6px;
      stroke-linecap: round;
      stroke-linejoin: round;
      /* 95px beam length, 172px void = 267px exact mathematical perimeter */
      stroke-dasharray: 95 172; 
    }

    .path-blue {
      stroke: url(#cyan-blue-purple);
      filter: url(#super-bloom);
      animation: orbit-cw 2.4s linear infinite;
    }

    .path-yellow {
      stroke: url(#yellow-orange-pink);
      filter: url(#super-bloom);
      animation: orbit-ccw 2.4s linear infinite;
    }

    /* Exactly locked to the 267px perimeter */
    @keyframes orbit-cw {
      0% { stroke-dashoffset: 267; }
      100% { stroke-dashoffset: 0; }
    }

    @keyframes orbit-ccw {
      0% { stroke-dashoffset: -267; }
      100% { stroke-dashoffset: 0; }
    }

    @keyframes stage-breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.025); }
    }
  </style>
</head>
<body>

  <div class="loader-stage">
    
    <svg class="plasma-svg" viewBox="0 0 100 100">
      <defs>
        
        <linearGradient id="cyan-blue-purple" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#00f0ff" />
          <stop offset="50%" stop-color="#0058f0" />
          <stop offset="100%" stop-color="#9d00ff" />
        </linearGradient>

        <linearGradient id="yellow-orange-pink" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#fffb00" />
          <stop offset="50%" stop-color="#ff4800" />
          <stop offset="100%" stop-color="#ff0066" />
        </linearGradient>

        <filter id="super-bloom" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="1.2" result="tight_glow" />
          <feGaussianBlur stdDeviation="3.5" result="wide_glow" />
          <feMerge>
            <feMergeNode in="wide_glow" />
            <feMergeNode in="tight_glow" />
            <feMergeNode in="SourceGraphic" /> </feMerge>
        </filter>

      </defs>

      <polygon class="wave-path path-blue" points="6,20 94,20 98,36 50,91 2,36" />
      <polygon class="wave-path path-yellow" points="6,20 94,20 98,36 50,91 2,36" />

    </svg>

    <img 
      src="logo.png" 
      alt="Loading..." 
      class="loading-logo"
    >

  </div>

</body>
</html>
